name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  core:
    name: core (lib) — fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (core, all features)
        run: cargo clippy -p rubic-core --all-targets --all-features
      - name: Test (core, default)
        run: cargo test -p rubic-core
      - name: Test (core, optimal feature)
        run: cargo test -p rubic-core --features optimal

  app:
    name: app (bevy) — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Bevy Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev \
            libxkbcommon-dev
      - name: Build workspace
        run: cargo build --workspace
