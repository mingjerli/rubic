# Selects the `wasm_js` backend for `getrandom` on the web target. Required
# for the WebAssembly build (Bevy pulls in `getrandom`, which has no default
# backend on `wasm32-unknown-unknown`). Paired with the `getrandom` wasm_js
# feature in crates/app/Cargo.toml.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
